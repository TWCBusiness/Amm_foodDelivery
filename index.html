<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WACOAL — Stock Management</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose:     #c0516e;
    --rose-dark:#8b2d45;
    --rose-lt:  #f7dde5;
    --gold:     #c9a96e;
    --gold-lt:  #f5edd8;
    --black:    #1a1014;
    --charcoal: #2d1f25;
    --gray:     #6b5560;
    --white:    #fdf8fa;
    --card-bg:  #ffffff;
    --border:   rgba(192,81,110,.18);
    --shadow:   0 8px 40px rgba(139,45,69,.13);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--black);
    color: var(--charcoal);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* ── Background pattern ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(192,81,110,.22) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 85%, rgba(201,169,110,.18) 0%, transparent 55%),
      linear-gradient(160deg, #1a1014 0%, #2d1a20 50%, #1a1014 100%);
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c0516e' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: .5;
    z-index: 0;
    pointer-events: none;
  }

  /* ── App shell ── */
  #app {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    padding: 24px 16px;
  }

  /* ── Logo / Header ── */
  .brand-header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown .7s ease both;
  }
  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .brand-logo .diamond {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--rose) 0%, var(--rose-dark) 100%);
    transform: rotate(45deg);
    border-radius: 4px;
    box-shadow: 0 4px 16px rgba(192,81,110,.5);
    flex-shrink: 0;
  }
  .brand-logo .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: .22em;
    color: var(--white);
    line-height: 1;
  }
  .brand-tagline {
    font-size: .75rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: var(--shadow), 0 0 0 1px var(--border);
    position: relative;
    overflow: hidden;
    animation: fadeUp .65s ease both .15s;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rose-dark), var(--rose), var(--gold), var(--rose));
    background-size: 200%;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: .8rem;
    color: var(--gray);
    letter-spacing: .05em;
    margin-bottom: 28px;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 20px 0;
  }

  /* ── Form elements ── */
  label {
    display: block;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--rose-dark);
    margin-bottom: 6px;
  }
  .field { margin-bottom: 20px; }

  input, select {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Sarabun', sans-serif;
    font-size: .95rem;
    color: var(--charcoal);
    background: var(--white);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px rgba(192,81,110,.13);
  }
  input::placeholder { color: #bba5ad; }

  /* password toggle */
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 44px; }
  .pw-toggle {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; padding: 4px;
    color: var(--gray);
    font-size: 1rem;
    line-height: 1;
  }
  .pw-toggle:hover { color: var(--rose); }

  /* select arrow */
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--rose);
    pointer-events: none;
    font-size: .9rem;
  }

  /* readonly display */
  .field-display {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: .95rem;
    color: var(--charcoal);
    background: var(--rose-lt);
    font-family: 'Sarabun', sans-serif;
    font-weight: 600;
    min-height: 44px;
    letter-spacing: .05em;
  }
  .field-display.gold { background: var(--gold-lt); }

  /* ── Primary Button ── */
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Sarabun', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, opacity .15s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--rose-dark) 0%, var(--rose) 60%, #d4637e 100%);
    color: #fff;
    box-shadow: 0 6px 24px rgba(192,81,110,.38);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(192,81,110,.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: transparent;
    color: var(--rose-dark);
    border: 1.5px solid var(--border);
    margin-top: 10px;
  }
  .btn-secondary:hover { background: var(--rose-lt); }
  .btn:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }

  /* ── Alert ── */
  .alert {
    display: none;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: .88rem;
    margin-bottom: 18px;
    font-weight: 500;
  }
  .alert.error { background: #fdecea; color: #b71c1c; border: 1px solid #f5c6cb; display: block; }
  .alert.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; display: block; }
  .alert.info { background: var(--rose-lt); color: var(--rose-dark); border: 1px solid var(--border); display: block; }

  /* ── User info bar ── */
  .user-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--rose-lt);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 22px;
    border: 1px solid var(--border);
  }
  .user-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose-dark), var(--rose));
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: .95rem;
    flex-shrink: 0;
  }
  .user-info { flex: 1; }
  .user-name { font-weight: 600; font-size: .9rem; color: var(--charcoal); }
  .user-code { font-size: .75rem; color: var(--gray); }
  .logout-btn {
    background: none; border: none;
    color: var(--rose-dark); font-size: .75rem;
    font-weight: 600; cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background .15s;
  }
  .logout-btn:hover { background: rgba(192,81,110,.12); }

  /* ── Item list ── */
  #item-list { margin-top: 28px; }
  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--rose-dark);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .item-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--white);
    border: 1.5px solid var(--border);
    margin-bottom: 8px;
    animation: fadeUp .3s ease both;
    transition: border-color .2s;
  }
  .item-row:hover { border-color: var(--rose); }
  .item-code { font-weight: 600; font-size: .9rem; color: var(--charcoal); }
  .item-qty {
    width: 70px;
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    text-align: center;
    font-size: .95rem;
    font-family: 'Sarabun', sans-serif;
    font-weight: 600;
    color: var(--charcoal);
    background: var(--white);
    outline: none;
    transition: border-color .2s;
  }
  .item-qty:focus { border-color: var(--rose); }
  .remove-btn {
    background: none; border: none;
    color: #ccc; cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s;
  }
  .remove-btn:hover { color: var(--rose); }

  /* add item row */
  .add-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    margin-bottom: 20px;
  }

  /* ── Bill badge ── */
  .bill-badge {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    letter-spacing: .05em;
    color: var(--rose-dark);
    font-weight: 600;
  }

  /* ── Loading spinner ── */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Page transitions ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── Success overlay ── */
  #success-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 999;
    background: rgba(26,16,20,.85);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
  }
  #success-overlay.show { display: flex; }
  .success-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose-dark), var(--rose));
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(192,81,110,.5);
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .success-text {
    color: var(--white);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .success-sub { color: var(--gold); font-size: .9rem; margin-bottom: 28px; }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .brand-logo .name { font-size: 2.1rem; }
    #app { padding: 20px 12px; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- ── Brand Header ── -->
  <div class="brand-header">
    <div class="brand-logo">
      <div class="diamond"></div>
      <div class="name">WACOAL</div>
    </div>
    <div class="brand-tagline">Stock Management System</div>
  </div>

  <!-- ══════════ PAGE 1: LOGIN ══════════ -->
  <div class="page active" id="page-login">
    <div class="card">
      <div class="card-title">เข้าสู่ระบบ</div>
      <div class="card-sub">กรุณาใส่รหัสพนักงานและรหัสผ่านเพื่อดำเนินการต่อ</div>

      <div id="login-alert" class="alert"></div>

      <div class="field">
        <label>รหัสพนักงาน (Emp. Code)</label>
        <input type="text" id="login-user" placeholder="เช่น EMP001" autocomplete="username" />
      </div>

      <div class="field">
        <label>รหัสผ่าน</label>
        <div class="pw-wrap">
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
          <button class="pw-toggle" onclick="togglePw()" id="pw-icon" title="แสดง/ซ่อนรหัสผ่าน">👁</button>
        </div>
      </div>

      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
        เข้าสู่ระบบ
      </button>
    </div>
  </div>

  <!-- ══════════ PAGE 2: STOCK ENTRY ══════════ -->
  <div class="page" id="page-stock">
    <div class="card">
      <div class="user-bar">
        <div class="user-avatar" id="user-avatar">W</div>
        <div class="user-info">
          <div class="user-name" id="user-display-name">—</div>
          <div class="user-code" id="user-display-code">—</div>
        </div>
        <button class="logout-btn" onclick="doLogout()">ออกจากระบบ</button>
      </div>

      <div class="card-title">บันทึกการตัดสต็อก</div>
      <div class="card-sub">กรอกข้อมูลรายการสินค้าที่ต้องการตัดสต็อก</div>

      <div id="stock-alert" class="alert"></div>

      <!-- Store (readonly) -->
      <div class="field">
        <label>Store (รหัสพนักงาน)</label>
        <div class="field-display" id="field-store">—</div>
      </div>

      <!-- TransDate -->
      <div class="field">
        <label>วันที่ทำรายการ (Trans Date)</label>
        <input type="date" id="field-date" onchange="updateBill()" />
      </div>

      <!-- Bill No -->
      <div class="field">
        <label>เลขที่บิล (Bill No.)</label>
        <div class="field-display gold bill-badge" id="field-bill">—</div>
      </div>

      <div class="divider"></div>

      <!-- Item list section -->
      <div class="section-label">เพิ่มรายการสินค้า</div>

      <!-- Add item row -->
      <div class="add-row">
        <div class="select-wrap">
          <select id="item-select" disabled>
            <option value="">— กำลังโหลดข้อมูลสินค้า... —</option>
          </select>
        </div>
        <button class="btn btn-primary" style="width:auto;padding:12px 18px;border-radius:10px;font-size:.85rem" onclick="addItem()">+ เพิ่ม</button>
      </div>

      <!-- Item rows -->
      <div id="item-list"></div>

      <div class="divider"></div>

      <button class="btn btn-primary" id="save-btn" onclick="doSave()" disabled>
        บันทึกข้อมูล
      </button>
      <button class="btn btn-secondary" onclick="resetForm()">เคลียร์ข้อมูล</button>
    </div>
  </div>
</div><!-- /app -->

<!-- ── Success Overlay ── -->
<div id="success-overlay">
  <div class="success-icon">✓</div>
  <div class="success-text">บันทึกสำเร็จ</div>
  <div class="success-sub" id="success-bill-text">—</div>
  <button class="btn btn-primary" style="width:auto;padding:12px 32px" onclick="afterSave()">บันทึกรายการใหม่</button>
</div>

<script>
// ════════════════════════════════════════
//  ⚙️  CONFIG — ใส่ URL ของ GAS ที่ Deploy แล้วตรงนี้
// ════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyMY0tF7FCUbiqnf839enRgSwnkc7Gh1OsYatu-DoUdNUFhwfWU4HGHGmsbcvBWLba0/exec';
// ════════════════════════════════════════

let currentUser = null;
let stockItems  = [];
let cartItems   = [];

/* ── Helpers ── */
function fmt(msg, type='error') {
  const el = document.getElementById(currentUser ? 'stock-alert' : 'login-alert');
  el.className = 'alert ' + type;
  el.textContent = msg;
  el.style.display = 'block';
}
function clearAlert(id) {
  const el = document.getElementById(id);
  el.style.display = 'none';
  el.textContent = '';
}
function setLoading(btnId, loading, text='บันทึกข้อมูล') {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> กำลังดำเนินการ...';
  } else {
    btn.disabled = false;
    btn.innerHTML = text;
  }
}
function togglePw() {
  const inp = document.getElementById('login-pass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── Date helpers ── */
function todayISO() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function buildBillNo(dateVal) {
  if (!dateVal) return '—';
  const d = dateVal.replace(/-/g,'');
  return d + '0111';
}
function updateBill() {
  const v = document.getElementById('field-date').value;
  document.getElementById('field-bill').textContent = buildBillNo(v);
  checkSaveReady();
}

/* ── GAS call ── */
async function gasCall(action, payload = {}) {
  const params = new URLSearchParams();
  params.append('action', action);
  params.append('data', JSON.stringify(payload));

  const res = await fetch(GAS_URL + '?' + params.toString(), {
    method:   'GET',
    redirect: 'follow'
  });

  if (!res.ok) throw new Error('Network error ' + res.status);
  return res.json();
}

/* ══════════ LOGIN ══════════ */
async function doLogin() {
  clearAlert('login-alert');
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!user || !pass) { fmt('กรุณากรอกรหัสพนักงานและรหัสผ่าน'); return; }

  setLoading('login-btn', true, '');
  document.getElementById('login-btn').innerHTML = '<span class="spinner"></span> กำลังตรวจสอบ...';

  try {
    const data = await gasCall('login', { username: user, password: pass });
    if (data.success) {
      currentUser = data.user; // { empCode, name }
      initStockPage();
    } else {
      fmt(data.message || 'รหัสพนักงานหรือรหัสผ่านไม่ถูกต้อง');
    }
  } catch(e) {
    fmt('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง');
    console.error(e);
  } finally {
    const btn = document.getElementById('login-btn');
    btn.disabled = false;
    btn.innerHTML = 'เข้าสู่ระบบ';
  }
}

/* ══════════ STOCK PAGE INIT ══════════ */
async function initStockPage() {
  showPage('page-stock');
  clearAlert('stock-alert');
  cartItems = [];

  // Set user info
  document.getElementById('field-store').textContent = currentUser.empCode;
  document.getElementById('user-display-name').textContent = currentUser.name || currentUser.empCode;
  document.getElementById('user-display-code').textContent = 'รหัส: ' + currentUser.empCode;
  document.getElementById('user-avatar').textContent = (currentUser.name || currentUser.empCode)[0].toUpperCase();

  // Default date = today
  document.getElementById('field-date').value = todayISO();
  updateBill();
  renderCart();

  // Load stock items
  try {
    const data = await gasCall('getStock', { empCode: currentUser.empCode });
    if (data.success) {
      stockItems = data.items || [];
      populateSelect();
    } else {
      fmt('โหลดข้อมูลสินค้าไม่สำเร็จ: ' + (data.message||''), 'error');
    }
  } catch(e) {
    fmt('ไม่สามารถโหลดข้อมูลสินค้าได้', 'error');
    console.error(e);
  }
}

function populateSelect() {
  const sel = document.getElementById('item-select');
  sel.innerHTML = '<option value="">— เลือกสินค้า (ITEM CODE) —</option>';
  stockItems.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.itemCode;
    opt.textContent = item.itemCode + (item.description ? ' — ' + item.description : '');
    sel.appendChild(opt);
  });
  sel.disabled = stockItems.length === 0;
  if (stockItems.length === 0) {
    fmt('ไม่พบสินค้าในสต็อกของท่าน', 'info');
  }
}

/* ── Cart management ── */
function addItem() {
  const sel = document.getElementById('item-select');
  const code = sel.value;
  if (!code) return;
  if (cartItems.find(x => x.itemCode === code)) {
    fmt('สินค้านี้มีอยู่ในรายการแล้ว', 'info'); return;
  }
  cartItems.push({ itemCode: code, qty: 1 });
  clearAlert('stock-alert');
  renderCart();
  checkSaveReady();
  sel.value = '';
}

function removeItem(code) {
  cartItems = cartItems.filter(x => x.itemCode !== code);
  renderCart();
  checkSaveReady();
}

function renderCart() {
  const list = document.getElementById('item-list');
  list.innerHTML = '';
  if (cartItems.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#bba5ad;font-size:.88rem;padding:16px 0">ยังไม่มีรายการสินค้า</div>';
    return;
  }
  cartItems.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <div class="item-code">${item.itemCode}</div>
      <input class="item-qty" type="number" min="1" value="${item.qty}"
        onchange="updateQty('${item.itemCode}', this.value)"
        oninput="updateQty('${item.itemCode}', this.value)"
        title="จำนวน" />
      <button class="remove-btn" onclick="removeItem('${item.itemCode}')" title="ลบ">✕</button>
    `;
    list.appendChild(row);
  });
}

function updateQty(code, val) {
  const item = cartItems.find(x => x.itemCode === code);
  if (item) item.qty = parseInt(val) || 1;
  checkSaveReady();
}

function checkSaveReady() {
  const hasDate  = !!document.getElementById('field-date').value;
  const hasItems = cartItems.length > 0;
  const allQty   = cartItems.every(x => x.qty > 0);
  document.getElementById('save-btn').disabled = !(hasDate && hasItems && allQty);
}

/* ══════════ SAVE ══════════ */
async function doSave() {
  clearAlert('stock-alert');
  const transDate = document.getElementById('field-date').value;
  const billNo    = buildBillNo(transDate);

  if (!transDate || cartItems.length === 0) {
    fmt('กรุณากรอกข้อมูลให้ครบถ้วน'); return;
  }

  setLoading('save-btn', true);

  const rows = cartItems.map(item => ({
    store:    currentUser.empCode,
    transDate,
    billNo,
    itemCode: item.itemCode,
    qty:      item.qty
  }));

  try {
    const data = await gasCall('saveStock', { rows });
    if (data.success) {
      document.getElementById('success-bill-text').textContent = 'Bill No: ' + billNo + ' | ' + cartItems.length + ' รายการ';
      document.getElementById('success-overlay').classList.add('show');
    } else {
      fmt('บันทึกไม่สำเร็จ: ' + (data.message||''));
    }
  } catch(e) {
    fmt('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
    console.error(e);
  } finally {
    setLoading('save-btn', false);
  }
}

function afterSave() {
  document.getElementById('success-overlay').classList.remove('show');
  cartItems = [];
  document.getElementById('field-date').value = todayISO();
  updateBill();
  renderCart();
}

function resetForm() {
  cartItems = [];
  document.getElementById('field-date').value = todayISO();
  updateBill();
  renderCart();
  clearAlert('stock-alert');
}

function doLogout() {
  currentUser = null;
  stockItems  = [];
  cartItems   = [];
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  clearAlert('login-alert');
  showPage('page-login');
}

/* ── Enter key on login ── */
document.addEventListener('DOMContentLoaded', () => {
  ['login-user','login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
});
</script>
</body>
</html>
