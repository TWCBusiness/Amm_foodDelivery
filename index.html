<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WACOAL — Stock Management</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose:     #b8455f;
    --rose-dark:#7a2038;
    --rose-lt:  #faf0f3;
    --gold:     #b8935a;
    --gold-lt:  #faf5ec;
    --black:    #16090d;
    --charcoal: #241419;
    --gray:     #7a6068;
    --mid:      #a08088;
    --white:    #ffffff;
    --surface:  #fdfbfc;
    --border:   rgba(184,69,95,.14);
    --shadow:   0 2px 24px rgba(122,32,56,.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--black);
    color: var(--charcoal);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(184,69,95,.18) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 85% 90%, rgba(184,147,90,.12) 0%, transparent 50%),
      linear-gradient(170deg, #16090d 0%, #200d14 55%, #16090d 100%);
    z-index: 0;
  }

  #app {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    padding: 32px 16px 48px;
  }

  /* ── Brand Header ── */
  .brand-header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown .6s ease both;
  }
  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .brand-logo .diamond {
    width: 32px; height: 32px;
    background: linear-gradient(145deg, var(--rose) 0%, var(--rose-dark) 100%);
    transform: rotate(45deg);
    border-radius: 3px;
    box-shadow: 0 3px 14px rgba(184,69,95,.45);
    flex-shrink: 0;
  }
  .brand-logo .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 600;
    letter-spacing: .28em;
    color: #fff;
    line-height: 1;
  }
  .brand-tagline {
    font-size: .68rem;
    letter-spacing: .42em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
    opacity: .85;
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 36px 32px;
    box-shadow: var(--shadow), 0 0 0 1px var(--border);
    position: relative;
    overflow: hidden;
    animation: fadeUp .55s ease both .1s;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rose-dark), var(--rose), var(--gold), var(--rose-dark));
    background-size: 300%;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:300%} }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 3px;
    letter-spacing: .01em;
  }
  .card-sub {
    font-size: .78rem;
    color: var(--mid);
    margin-bottom: 28px;
    font-weight: 400;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 22px 0;
  }

  /* ── Labels ── */
  label {
    display: block;
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 5px;
  }
  .field { margin-bottom: 18px; }

  /* ── Inputs ── */
  input, select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Sarabun', sans-serif;
    font-size: .93rem;
    color: var(--charcoal);
    background: var(--surface);
    transition: border-color .18s, box-shadow .18s;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px rgba(184,69,95,.10);
    background: #fff;
  }
  input::placeholder { color: #c5adb4; }

  /* password toggle */
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 44px; }
  .pw-toggle {
    position: absolute; right: 13px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; padding: 4px;
    color: var(--mid); font-size: .95rem; line-height: 1;
    transition: color .15s;
  }
  .pw-toggle:hover { color: var(--rose); }

  /* select arrow */
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute; right: 13px; top: 50%;
    transform: translateY(-50%);
    color: var(--rose); pointer-events: none; font-size: .85rem;
  }

  /* readonly display — same style as input */
  .field-display {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .93rem;
    font-family: 'Sarabun', sans-serif;
    font-weight: 500;
    color: var(--charcoal);
    background: var(--rose-lt);
    min-height: 42px;
    letter-spacing: .01em;
  }
  .field-display.gold {
    background: var(--gold-lt);
    border-color: rgba(184,147,90,.2);
  }

  /* ── Buttons ── */
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    font-family: 'Sarabun', sans-serif;
    font-size: .9rem;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform .13s, box-shadow .13s, opacity .13s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--rose-dark) 0%, var(--rose) 100%);
    color: #fff;
    box-shadow: 0 4px 16px rgba(184,69,95,.32);
  }
  .btn-primary:hover  { transform: translateY(-1px); box-shadow: 0 7px 20px rgba(184,69,95,.38); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: transparent;
    color: var(--mid);
    border: 1.5px solid var(--border);
    margin-top: 10px;
  }
  .btn-secondary:hover { background: var(--rose-lt); color: var(--rose-dark); border-color: var(--rose); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

  /* ── Alert ── */
  .alert {
    display: none;
    padding: 11px 14px;
    border-radius: 8px;
    font-size: .85rem;
    margin-bottom: 18px;
    font-weight: 500;
  }
  .alert.error   { background: #fef0f0; color: #9b1c1c; border: 1px solid #fbd5d5; display: block; }
  .alert.success { background: #f0faf1; color: #1e6b2e; border: 1px solid #c6e8cb; display: block; }
  .alert.info    { background: var(--rose-lt); color: var(--rose-dark); border: 1px solid var(--border); display: block; }

  /* ── User bar ── */
  .user-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose-dark), var(--rose));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: .88rem;
    flex-shrink: 0;
    letter-spacing: .02em;
  }
  .user-info { flex: 1; }
  .user-name { font-weight: 600; font-size: .88rem; color: var(--charcoal); }
  .user-code { font-size: .72rem; color: var(--mid); margin-top: 1px; }
  .logout-btn {
    background: none; border: none;
    color: var(--mid); font-size: .7rem;
    font-weight: 600; cursor: pointer;
    text-transform: uppercase; letter-spacing: .08em;
    padding: 5px 9px; border-radius: 6px;
    border: 1px solid var(--border);
    transition: all .15s;
    font-family: 'Sarabun', sans-serif;
  }
  .logout-btn:hover { background: var(--rose-lt); color: var(--rose-dark); border-color: var(--rose); }

  /* ── Section label ── */
  .section-label {
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── Item rows ── */
  #item-list { margin-top: 0; }
  .item-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    margin-bottom: 7px;
    animation: fadeUp .25s ease both;
    transition: border-color .15s;
  }
  .item-row:hover { border-color: rgba(184,69,95,.35); }
  .item-code { font-weight: 600; font-size: .88rem; color: var(--charcoal); letter-spacing: .02em; }
  .item-qty {
    width: 68px;
    padding: 6px 8px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    text-align: center;
    font-size: .93rem;
    font-family: 'Sarabun', sans-serif;
    font-weight: 600;
    color: var(--charcoal);
    background: #fff;
    outline: none;
    transition: border-color .15s;
  }
  .item-qty:focus { border-color: var(--rose); }
  .remove-btn {
    background: none; border: none;
    color: #d4b8be; cursor: pointer;
    font-size: 1rem; line-height: 1;
    padding: 3px 5px; border-radius: 4px;
    transition: color .13s;
  }
  .remove-btn:hover { color: var(--rose); }

  /* add row */
  .add-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    margin-bottom: 16px;
  }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .page { display: none; }
  .page.active { display: block; }

  /* ── Success overlay ── */
  #success-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 999;
    background: rgba(22,9,13,.88);
    backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
    flex-direction: column; text-align: center;
    padding: 24px;
  }
  #success-overlay.show { display: flex; }
  .success-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rose-dark), var(--rose));
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; margin-bottom: 20px;
    box-shadow: 0 6px 28px rgba(184,69,95,.45);
    animation: popIn .45s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .success-text {
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem; font-weight: 600; margin-bottom: 6px;
  }
  .success-sub { color: var(--gold); font-size: .88rem; margin-bottom: 28px; }

  @media (max-width: 480px) {
    .card { padding: 24px 18px; }
    .brand-logo .name { font-size: 2rem; }
    #app { padding: 24px 12px 40px; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- ── Brand Header ── -->
  <div class="brand-header">
    <div class="brand-logo">
      <div class="diamond"></div>
      <div class="name">WACOAL</div>
    </div>
    <div class="brand-tagline">Stock Management System</div>
  </div>

  <!-- ══════════ PAGE 1: LOGIN ══════════ -->
  <div class="page active" id="page-login">
    <div class="card">
      <div class="card-title">เข้าสู่ระบบ</div>
      <div class="card-sub">กรุณาใส่รหัสพนักงานและรหัสผ่านเพื่อดำเนินการต่อ</div>

      <div id="login-alert" class="alert"></div>

      <div class="field">
        <label>รหัสพนักงาน (Emp. Code)</label>
        <input type="text" id="login-user" placeholder="เช่น EMP001" autocomplete="username" />
      </div>

      <div class="field">
        <label>รหัสผ่าน</label>
        <div class="pw-wrap">
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
          <button class="pw-toggle" onclick="togglePw()" id="pw-icon" title="แสดง/ซ่อนรหัสผ่าน">👁</button>
        </div>
      </div>

      <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
        เข้าสู่ระบบ
      </button>
    </div>
  </div>

  <!-- ══════════ PAGE 2: STOCK ENTRY ══════════ -->
  <div class="page" id="page-stock">
    <div class="card">
      <div class="user-bar">
        <div class="user-avatar" id="user-avatar">W</div>
        <div class="user-info">
          <div class="user-name" id="user-display-name">—</div>
          <div class="user-code" id="user-display-code">—</div>
        </div>
        <button class="logout-btn" onclick="doLogout()">ออกจากระบบ</button>
      </div>

      <div class="card-title">บันทึกการตัดสต็อก</div>
      <div class="card-sub">กรอกข้อมูลรายการสินค้าที่ต้องการตัดสต็อก</div>

      <div id="stock-alert" class="alert"></div>

      <!-- Store (readonly) -->
      <div class="field">
        <label>Store (รหัสพนักงาน)</label>
        <div class="field-display" id="field-store">—</div>
      </div>

      <!-- TransDate -->
      <div class="field">
        <label>วันที่ทำรายการ (Trans Date)</label>
        <input type="date" id="field-date" onchange="updateBill()" />
      </div>

      <!-- Bill No -->
      <div class="field">
        <label>เลขที่บิล (Bill No.)</label>
        <div class="field-display gold" id="field-bill" style="font-weight:600;letter-spacing:.04em;">—</div>
      </div>

      <div class="divider"></div>

      <!-- Item list section -->
      <div class="section-label">เพิ่มรายการสินค้า</div>

      <!-- Add item row -->
      <div class="add-row">
        <div class="select-wrap">
          <select id="item-select" disabled>
            <option value="">— กำลังโหลดข้อมูลสินค้า... —</option>
          </select>
        </div>
        <button class="btn btn-primary" style="width:auto;padding:12px 18px;border-radius:10px;font-size:.85rem" onclick="addItem()">+ เพิ่ม</button>
      </div>

      <!-- Item rows -->
      <div id="item-list"></div>

      <div class="divider"></div>

      <button class="btn btn-primary" id="save-btn" onclick="doSave()" disabled>
        บันทึกข้อมูล
      </button>
      <button class="btn btn-secondary" onclick="resetForm()">เคลียร์ข้อมูล</button>
    </div>
  </div>
</div><!-- /app -->

<!-- ── Success Overlay ── -->
<div id="success-overlay">
  <div class="success-icon">✓</div>
  <div class="success-text">บันทึกสำเร็จ</div>
  <div class="success-sub" id="success-bill-text">—</div>
  <button class="btn btn-primary" style="width:auto;padding:12px 32px" onclick="afterSave()">บันทึกรายการใหม่</button>
</div>

<script>
// ════════════════════════════════════════
//  ⚙️  CONFIG — ใส่ URL ของ GAS ที่ Deploy แล้วตรงนี้
// ════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxyzeDSe2CgcjSIocf7nNYOBb0FxXH-DGWuUFxU18jiySAMjJsZV8-jQ1glt7uKkESt/exec';
// ════════════════════════════════════════

let currentUser = null;
let stockItems  = [];
let cartItems   = [];

/* ── Helpers ── */
function fmt(msg, type='error') {
  const el = document.getElementById(currentUser ? 'stock-alert' : 'login-alert');
  el.className = 'alert ' + type;
  el.textContent = msg;
  el.style.display = 'block';
}
function clearAlert(id) {
  const el = document.getElementById(id);
  el.style.display = 'none';
  el.textContent = '';
}
function setLoading(btnId, loading, text='บันทึกข้อมูล') {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> กำลังดำเนินการ...';
  } else {
    btn.disabled = false;
    btn.innerHTML = text;
  }
}
function togglePw() {
  const inp = document.getElementById('login-pass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── Date helpers ── */
function todayISO() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function buildBillNo(dateVal) {
  if (!dateVal) return '—';
  const d = dateVal.replace(/-/g,'');
  return d + '0111';
}
function updateBill() {
  const v = document.getElementById('field-date').value;
  document.getElementById('field-bill').textContent = buildBillNo(v);
  checkSaveReady();
}

/* ── GAS call ── */
async function gasCall(action, payload = {}) {
  const params = new URLSearchParams();
  params.append('action', action);
  params.append('data', JSON.stringify(payload));

  const res = await fetch(GAS_URL + '?' + params.toString(), {
    method:   'GET',
    redirect: 'follow'
  });

  if (!res.ok) throw new Error('Network error ' + res.status);
  return res.json();
}

/* ══════════ LOGIN ══════════ */
async function doLogin() {
  clearAlert('login-alert');
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!user || !pass) { fmt('กรุณากรอกรหัสพนักงานและรหัสผ่าน'); return; }

  setLoading('login-btn', true, '');
  document.getElementById('login-btn').innerHTML = '<span class="spinner"></span> กำลังตรวจสอบ...';

  try {
    const data = await gasCall('login', { username: user, password: pass });
    if (data.success) {
      currentUser = data.user; // { empCode, name }
      initStockPage();
    } else {
      fmt(data.message || 'รหัสพนักงานหรือรหัสผ่านไม่ถูกต้อง');
    }
  } catch(e) {
    fmt('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง');
    console.error(e);
  } finally {
    const btn = document.getElementById('login-btn');
    btn.disabled = false;
    btn.innerHTML = 'เข้าสู่ระบบ';
  }
}

/* ══════════ STOCK PAGE INIT ══════════ */
async function initStockPage() {
  showPage('page-stock');
  clearAlert('stock-alert');
  cartItems = [];

  // Set user info
  document.getElementById('field-store').textContent = currentUser.empCode;
  document.getElementById('user-display-name').textContent = currentUser.name || currentUser.empCode;
  document.getElementById('user-display-code').textContent = 'รหัส: ' + currentUser.empCode;
  document.getElementById('user-avatar').textContent = (currentUser.name || currentUser.empCode)[0].toUpperCase();

  // Default date = today
  document.getElementById('field-date').value = todayISO();
  updateBill();
  renderCart();

  // Load stock items
  try {
    const data = await gasCall('getStock', { empCode: currentUser.empCode });
    if (data.success) {
      stockItems = data.items || [];
      populateSelect();
    } else {
      fmt('โหลดข้อมูลสินค้าไม่สำเร็จ: ' + (data.message||''), 'error');
    }
  } catch(e) {
    fmt('ไม่สามารถโหลดข้อมูลสินค้าได้', 'error');
    console.error(e);
  }
}

function populateSelect() {
  const sel = document.getElementById('item-select');
  sel.innerHTML = '<option value="">— เลือกสินค้า (ITEM CODE) —</option>';
  stockItems.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.itemCode;
    opt.textContent = item.itemCode + (item.description ? ' — ' + item.description : '');
    sel.appendChild(opt);
  });
  sel.disabled = stockItems.length === 0;
  if (stockItems.length === 0) {
    fmt('ไม่พบสินค้าในสต็อกของท่าน', 'info');
  }
}

/* ── Cart management ── */
function addItem() {
  const sel = document.getElementById('item-select');
  const code = sel.value;
  if (!code) return;
  if (cartItems.find(x => x.itemCode === code)) {
    fmt('สินค้านี้มีอยู่ในรายการแล้ว', 'info'); return;
  }
  cartItems.push({ itemCode: code, qty: 1 });
  clearAlert('stock-alert');
  renderCart();
  checkSaveReady();
  sel.value = '';
}

function removeItem(code) {
  cartItems = cartItems.filter(x => x.itemCode !== code);
  renderCart();
  checkSaveReady();
}

function renderCart() {
  const list = document.getElementById('item-list');
  list.innerHTML = '';
  if (cartItems.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#bba5ad;font-size:.88rem;padding:16px 0">ยังไม่มีรายการสินค้า</div>';
    return;
  }
  cartItems.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <div class="item-code">${item.itemCode}</div>
      <input class="item-qty" type="number" min="1" value="${item.qty}"
        onchange="updateQty('${item.itemCode}', this.value)"
        oninput="updateQty('${item.itemCode}', this.value)"
        title="จำนวน" />
      <button class="remove-btn" onclick="removeItem('${item.itemCode}')" title="ลบ">✕</button>
    `;
    list.appendChild(row);
  });
}

function updateQty(code, val) {
  const item = cartItems.find(x => x.itemCode === code);
  if (item) item.qty = parseInt(val) || 1;
  checkSaveReady();
}

function checkSaveReady() {
  const hasDate  = !!document.getElementById('field-date').value;
  const hasItems = cartItems.length > 0;
  const allQty   = cartItems.every(x => x.qty > 0);
  document.getElementById('save-btn').disabled = !(hasDate && hasItems && allQty);
}

/* ══════════ SAVE ══════════ */
async function doSave() {
  clearAlert('stock-alert');
  const transDate = document.getElementById('field-date').value;
  const billNo    = buildBillNo(transDate);

  if (!transDate || cartItems.length === 0) {
    fmt('กรุณากรอกข้อมูลให้ครบถ้วน'); return;
  }

  setLoading('save-btn', true);

  const rows = cartItems.map(item => ({
    storeName: currentUser.name,
    store:     currentUser.empCode,
    transDate,
    billNo,
    itemCode:  item.itemCode,
    qty:       item.qty
  }));

  try {
    const data = await gasCall('saveStock', { rows });
    if (data.success) {
      document.getElementById('success-bill-text').textContent = 'Bill No: ' + billNo + ' | ' + cartItems.length + ' รายการ';
      document.getElementById('success-overlay').classList.add('show');
    } else {
      fmt('บันทึกไม่สำเร็จ: ' + (data.message||''));
    }
  } catch(e) {
    fmt('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
    console.error(e);
  } finally {
    setLoading('save-btn', false);
  }
}

function afterSave() {
  document.getElementById('success-overlay').classList.remove('show');
  cartItems = [];
  document.getElementById('field-date').value = todayISO();
  updateBill();
  renderCart();
}

function resetForm() {
  cartItems = [];
  document.getElementById('field-date').value = todayISO();
  updateBill();
  renderCart();
  clearAlert('stock-alert');
}

function doLogout() {
  currentUser = null;
  stockItems  = [];
  cartItems   = [];
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  clearAlert('login-alert');
  showPage('page-login');
}

/* ── Enter key on login ── */
document.addEventListener('DOMContentLoaded', () => {
  ['login-user','login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
});
</script>
</body>
</html>
